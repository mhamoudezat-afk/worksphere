services:
  - type: web
    name: worksphere-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server-fixed.js
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        value: worksphere_secret_2024
      - key: CORS_ORIGIN
        value: https://worksphere.vercel.app